<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plano de Mídia — MiaMK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/plano-midia.css" />
  </head>
  <body>
    <div class="app-wrapper">

      <!-- Navigation Rail -->
      <nav class="app-nav">
        <a href="/" class="nav-brand">M</a>
        <div class="nav-items">
          <a href="/" class="nav-item" id="nav-menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Início</span>
          </a>
          <a href="/consulta.html" class="nav-item" id="nav-consulta">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>Consulta</span>
          </a>
          <a href="/plano-midia.html" class="nav-item" id="nav-plano-midia">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span>Plano</span>
          </a>
        </div>
      </nav>

      <!-- Plano de Mídia -->
      <main class="pm-shell">
        <section class="pm-panel">
          <header class="conversation-header">
            <div class="header-left">
              <div class="model-info">
                <div class="model-dot"></div>
                <span class="model-name">Plano de Mídia</span>
              </div>
            </div>
            <button id="pm-new-chat" class="ghost-button" type="button">Nova conversa</button>
          </header>

          <section id="pm-feed" class="conversation-feed">
            <div class="intro-block">
              <div class="intro-avatar">M</div>
              <p class="intro-text">Olá! Envie arquivos e descreva o que precisa para montar seu plano de mídia.</p>
            </div>
          </section>

          <div class="chat-bottom">
            <div id="pm-file-list" class="file-list"></div>
            <form id="pm-chat-form" class="chat-bar">
              <label class="upload-btn" title="Anexar arquivo">
                <input type="file" id="pm-file-input" multiple accept=".xlsx,.xls,.csv,.pdf,.docx,.txt" hidden />
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </label>
              <input id="pm-chat-input" class="chat-input" type="text" placeholder="Descreva o que precisa para o plano de mídia..." autocomplete="off" />
              <button type="submit" class="chat-send">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </form>
          </div>
        </section>
      </main>

    </div>
    <script src="/js/shared.js"></script>
    <script src="/js/plano-midia.js"></script>
  </body>
</html>
